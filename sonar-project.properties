sonar.projectKey=task-manager
sonar.projectName=Task Manager
sonar.sources=backend/src,frontend/src

# Email HTML templates require inline styles and deprecated table attributes
# for compatibility with email clients (Gmail, Outlook, Apple Mail).
# These are intentional — not code quality issues.
sonar.exclusions=backend/src/templates/*.html

# SonarQube's HTML analyser does not understand JSX — it rejects {expression}
# as an invalid ARIA attribute value. TSX files are covered by the TypeScript
# analyser (with eslint-plugin-jsx-a11y) which handles JSX correctly.
sonar.html.file.suffixes=.html,.htm
