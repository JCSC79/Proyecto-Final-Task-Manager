version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abc123..
      POSTGRES_DB: tasks_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq: 
    image: rabbitmq:3-management
    container_name: rabbitmq_broker
    restart: always
    ports:
      - "5672:5672"   # Port for communication
      - "15672:15672" # Control web panel
    environment:
      RABBITMQ_DEFAULT_USER: JC
      RABBITMQ_DEFAULT_PASS: abc123..

volumes:
  postgres_data: